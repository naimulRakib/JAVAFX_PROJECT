<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScholarGrid RAG Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0f19;
    --panel: #0f1424;
    --panel-2: #131a2f;
    --text: #e6e9f2;
    --muted: #8b94a7;
    --accent: #4f46e5;
    --accent-2: #7c3aed;
    --border: #1c2340;
  }

  body {
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  #topbar {
    padding: 12px 16px;
    background: linear-gradient(90deg, #0c1020, #12193a);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #topbar .title {
    font-weight: 700;
    font-size: 14px;
    color: #c7d2fe;
  }
  #topbar .pill {
    font-size: 11px;
    color: #a5b4fc;
    border: 1px solid rgba(99,102,241,0.4);
    padding: 2px 8px;
    border-radius: 999px;
  }

  /* Chat area */
  #chat-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 18px 16px 24px;
  }
  #chat-wrap::-webkit-scrollbar { width: 6px; }
  #chat-wrap::-webkit-scrollbar-thumb { background: #2a3254; border-radius: 10px; }

  .msg {
    max-width: 860px;
    margin: 0 auto 14px;
    display: flex;
    gap: 12px;
  }
  .avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    background: #1e2438;
    color: #c7d2fe;
    flex: 0 0 28px;
  }
  .bubble {
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    line-height: 1.65;
    font-size: 14px;
    width: 100%;
  }
  .msg.user .avatar { background: #312e81; color: #e0e7ff; }
  .msg.user .bubble {
    background: linear-gradient(135deg, #2f2a63, #342b6f);
    border-color: #3f3b77;
  }

  /* AI HTML styling */
  .bubble h1, .bubble h2, .bubble h3 { color: #c7d2fe; margin: 8px 0 6px; }
  .bubble p { margin: 6px 0; }
  .bubble ul, .bubble ol { padding-left: 20px; margin: 8px 0; }
  .bubble li { margin: 4px 0; }
  .bubble a { color: #a5b4fc; text-decoration: underline; word-break: break-all; }
  .bubble code { background: #0f172a; padding: 2px 6px; border-radius: 6px; color: #93c5fd; }
  .bubble pre { background: #0b1022; padding: 12px; border-radius: 8px; overflow-x: auto; }

  /* Typing */
  .typing {
    display: inline-flex; gap: 6px; align-items: center;
  }
  .typing span { width: 6px; height: 6px; background: #a5b4fc; border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: .15s; }
  .typing span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

  /* Input area */
  #input-bar {
    border-top: 1px solid var(--border);
    padding: 14px 16px;
    background: #0c1122;
  }
  #input-inner {
    max-width: 900px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 160px 1fr auto;
    gap: 10px;
  }
  select, input {
    background: #0f162d;
    color: var(--text);
    border: 1px solid #1f2a4a;
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 13px;
    outline: none;
  }
  select:focus, input:focus { border-color: #4f46e5; }
  #send-btn {
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    color: white;
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    font-weight: 700;
    cursor: pointer;
  }
  #send-btn:disabled { opacity: .6; cursor: not-allowed; }

  @media (max-width: 720px) {
    #input-inner { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div id="topbar">
  <div class="title">ScholarGrid AI</div>
  <div class="pill">RAG • Resources</div>
</div>

<div id="chat-wrap">
  <div class="msg ai">
    <div class="avatar">AI</div>
    <div class="bubble">
      <strong>Welcome.</strong><br/><br/>
      Ask about courses, CTs, labs, or any topic — I will answer using your community resources.
    </div>
  </div>
</div>

<div id="input-bar">
  <div id="input-inner">
    <select id="course-select">
      <option value="">All Courses</option>
    </select>
    <input id="question-input" type="text" placeholder="Ask about topics, CTs, resources..." />
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  var API_BASE = "http://localhost:8080";
  var currentUserId = null;

  function setUserId(id) { currentUserId = id; }
  function setCourses(jsonStr) {
    try {
      const list = JSON.parse(jsonStr);
      const sel = document.getElementById('course-select');
      list.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.code;
        opt.textContent = c.code + " — " + c.title;
        sel.appendChild(opt);
      });
    } catch (e) { console.log('Course parse failed', e); }
  }

  function appendMessage(role, html) {
    const wrap = document.getElementById('chat-wrap');
    const msg = document.createElement('div');
    msg.className = 'msg ' + role;
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'ME' : 'AI';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = html;
    msg.appendChild(avatar);
    msg.appendChild(bubble);
    wrap.appendChild(msg);
    wrap.scrollTop = wrap.scrollHeight;
  }

  function showTyping() {
    const wrap = document.getElementById('chat-wrap');
    const msg = document.createElement('div');
    msg.className = 'msg ai';
    msg.id = 'typing';
    msg.innerHTML = '<div class="avatar">AI</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
    wrap.appendChild(msg);
    wrap.scrollTop = wrap.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('question-input');
    const btn = document.getElementById('send-btn');
    const course = document.getElementById('course-select').value;
    const q = input.value.trim();
    if (!q) return;
    appendMessage('user', q);
    input.value = '';
    btn.disabled = true;
    showTyping();

    try {
      const res = await fetch(API_BASE + '/api/ai/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q, course: course, userId: currentUserId })
      });
      const data = await res.json();
      removeTyping();
      appendMessage('ai', data.html || '<div class="error-block">No response</div>');
    } catch (err) {
      removeTyping();
      appendMessage('ai', '<div class="error-block">Server error. Try again.</div>');
    }
    btn.disabled = false;
  }

  document.getElementById('question-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendMessage();
  });
</script>
</body>
</html>
