<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f0f2f5;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Chat area ── */
  #chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  #chat-box::-webkit-scrollbar { width: 5px; }
  #chat-box::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }

  /* ── Message bubbles ── */
  .msg {
    max-width: 88%;
    padding: 12px 16px;
    border-radius: 18px;
    word-wrap: break-word;
    font-size: 14px;
    line-height: 1.6;
  }
  .msg.user {
    background: #6c3fc8;
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }
  .msg.ai {
    background: white;
    color: #1e2736;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08);
  }

  /* ── AI HTML content styling ── */
  .msg.ai h1 { font-size: 16px; color: #6c3fc8; margin: 10px 0 5px; }
  .msg.ai h2 { font-size: 15px; color: #6c3fc8; margin: 10px 0 5px; }
  .msg.ai h3 { font-size: 14px; color: #6c3fc8; margin: 8px 0 4px; }
  .msg.ai p  { margin: 6px 0; line-height: 1.7; }
  .msg.ai ul, .msg.ai ol { padding-left: 20px; margin: 6px 0; }
  .msg.ai li { margin: 4px 0; }
  .msg.ai strong { color: #2c3e50; font-weight: 600; }
  .msg.ai em { color: #555; }
  .msg.ai a {
    color: #6c3fc8;
    text-decoration: underline;
    word-break: break-all;
  }
  .msg.ai code {
    background: #f0f0f0;
    color: #c7254e;
    padding: 2px 5px;
    border-radius: 4px;
    font-family: monospace;
    font-size: 13px;
  }
  .msg.ai pre {
    background: #1e2736;
    color: #e2e8f0;
    padding: 12px;
    border-radius: 8px;
    overflow-x: auto;
    font-size: 13px;
    margin: 8px 0;
  }
  .msg.ai pre code { background: none; color: inherit; padding: 0; }
  .msg.ai hr { border: none; border-top: 1px solid #e0e0e0; margin: 10px 0; }
  .msg.ai blockquote {
    border-left: 3px solid #6c3fc8;
    padding-left: 10px;
    color: #555;
    margin: 6px 0;
  }
  .msg.ai table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13px; }
  .msg.ai th, .msg.ai td { border: 1px solid #ddd; padding: 6px 10px; text-align: left; }
  .msg.ai th { background: #f5f0ff; color: #6c3fc8; }

  /* Error block */
  .msg.ai .error-block {
    color: #ef4444;
    background: #fff0f0;
    border-left: 3px solid #ef4444;
    padding: 10px;
    border-radius: 6px;
  }

  /* ── Typing indicator ── */
  .typing {
    display: flex; gap: 5px;
    padding: 14px 18px;
    background: white;
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    align-self: flex-start;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08);
  }
  .typing span {
    width: 8px; height: 8px;
    background: #9b8ec4;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30% { transform: translateY(-8px); }
  }

  /* ── Input bar ── */
  #input-bar {
    display: flex;
    gap: 8px;
    padding: 10px 12px;
    background: white;
    border-top: 1px solid #e4e4e4;
    align-items: center;
  }
  #course-select {
    padding: 9px 10px;
    border: 1px solid #ddd;
    border-radius: 10px;
    font-size: 13px;
    background: #fafafa;
    width: 140px;
    outline: none;
    cursor: pointer;
  }
  #course-select:focus { border-color: #6c3fc8; }
  #question-input {
    flex: 1;
    padding: 9px 14px;
    border: 1px solid #ddd;
    border-radius: 10px;
    font-size: 14px;
    outline: none;
    background: #fafafa;
  }
  #question-input:focus { border-color: #6c3fc8; background: white; }
  #send-btn {
    padding: 9px 20px;
    background: #6c3fc8;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    transition: background 0.2s;
  }
  #send-btn:hover:not(:disabled) { background: #5a32a3; }
  #send-btn:disabled { background: #b0a0d8; cursor: not-allowed; }
</style>
</head>
<body>

<div id="chat-box">
  <div class="msg ai">
    <strong>👋 ScholarGrid AI</strong><br><br>
    I can help you find resources, explain topics, and guide your studies.
    Select a course and ask anything!
  </div>
</div>

<div id="input-bar">
  <select id="course-select">
    <option value="">All Courses</option>
  </select>
  <input id="question-input" type="text"
         placeholder="Ask about topics, CTs, resources..." />
  <button id="send-btn" onclick="sendMessage()">Ask ✨</button>
</div>

<script>
  var API_BASE = "http://localhost:8080";
  var currentUserId = null;

  // Called by JavaFX after page load
  function setUserId(id) {
    currentUserId = id;
    console.log("UserId set:", id);
  }

  function setCourses(coursesJson) {
    try {
      var courses = JSON.parse(coursesJson);
      var sel = document.getElementById("course-select");
      while (sel.options.length > 1) sel.remove(1);
      courses.forEach(function(c) {
        var opt = document.createElement("option");
        opt.value = c.code;
        opt.textContent = c.code + (c.title ? " — " + c.title : "");
        sel.appendChild(opt);
      });
    } catch(e) { console.error("setCourses error:", e); }
  }

  // Enter key = send
  document.getElementById("question-input").addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function sendMessage() {
    var input    = document.getElementById("question-input");
    var question = input.value.trim();
    if (!question) return;

    var course  = document.getElementById("course-select").value;
    var sendBtn = document.getElementById("send-btn");

    appendUserMessage(question);
    input.value = "";
    sendBtn.disabled = true;
    showTyping();

    fetch(API_BASE + "/api/ai/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        question: question,
        course:   course   || null,
        userId:   currentUserId || null
      })
    })
    .then(function(r) {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    })
    .then(function(data) {
      hideTyping();
      // ✅ KEY FIX: use innerHTML so the HTML from AI renders properly
      appendAIMessage(data.html || "<p>No response received.</p>");
      sendBtn.disabled = false;
    })
    .catch(function(err) {
      hideTyping();
      appendAIMessage(
        "<div class='error-block'>❌ Could not connect to ScholarGrid server.<br>"
        + "Make sure the app is running on port 8080.<br>"
        + "<small>" + err.message + "</small></div>"
      );
      sendBtn.disabled = false;
    });
  }

  function appendUserMessage(text) {
    var box = document.getElementById("chat-box");
    var div = document.createElement("div");
    div.className = "msg user";
    div.textContent = text;        // textContent = safe (no XSS from user input)
    box.appendChild(div);
    scrollBottom();
  }

  function appendAIMessage(htmlContent) {
    var box = document.getElementById("chat-box");
    var div = document.createElement("div");
    div.className = "msg ai";
    div.innerHTML = htmlContent;   // ✅ innerHTML = renders <h3>, <ul>, <a> etc.

    // Open links in system browser via JavaFX WebEngine bridge
    div.querySelectorAll("a").forEach(function(a) {
      a.setAttribute("target", "_blank");
      a.addEventListener("click", function(e) {
        e.preventDefault();
        // JavaFX WebView will intercept target=_blank links
        window.open(a.href, "_blank");
      });
    });

    box.appendChild(div);
    scrollBottom();
  }

  function showTyping() {
    var box = document.getElementById("chat-box");
    var div = document.createElement("div");
    div.className = "typing";
    div.id = "typing-indicator";
    div.innerHTML = "<span></span><span></span><span></span>";
    box.appendChild(div);
    scrollBottom();
  }

  function hideTyping() {
    var t = document.getElementById("typing-indicator");
    if (t) t.remove();
  }

  function scrollBottom() {
    var box = document.getElementById("chat-box");
    box.scrollTop = box.scrollHeight;
  }
</script>
</body>
</html>
